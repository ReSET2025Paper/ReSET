defaults:
  - ../policy@preset_openloop_policy: PresetOpenloop
  - ../policy@preset_policy: PresetPolicy
  - ../policy@open_loop: OpenLoop

task_name: drop_bowl
video_specs: 
  resize: [224, 224]
shape_meta:
  obs:
    agent_pos: 
      shape: [8]
      type: low_dim
    image:
      shape: [3, 224, 224]
      type: rgb
    image_gripper:
      shape: [3, 224, 224]
      type: rgb
  action:
    shape: [8]
    type: low_dim

start_position: [-0.232867, -0.524729, 0.137301, -2.3478, 0.0455863, 1.85082, 0.640032]
uncertainty_threshold: 7.0

# models
flow_model_path: /path/to/your/outputs/TemporalFlowDecoder/drop_bowl/[your_ckpt_dir]
uncertainty_model_path: /path/to/your/outputs/LinearEstimator/drop_bowl/[your_ckpt_dir]


# data (if needed)
preset_path: Null
action_preset_path: /path/to/your/robot_video/action_preset.pkl

# open loop path (if needed)
open_loop_path: Null

# If no visualization is needed, set it to None
# visualize_path: Null
visualize_path: outputs/deploy/${task.task_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

load_policy:
  open_loop: ${task.open_loop}
  preset_openloop: ${task.preset_openloop_policy}
  # preset: ${task.preset_policy}
  preset: /path/to/your/outputs/PresetPolicy/[your_ckpt_dir]
  flow: /path/to/your/outputs/FlowPolicy/[your_ckpt_dir]
  diffusion: /path/to/your/outputs/DiffusionPolicy/drop_bowl/[your_ckpt_dir]